name: Release

# Builds the macOS (Apple Silicon) DMG on a real Mac runner and publishes it to
# a GitHub Release, so the "Download for macOS" button in the README always
# points at a fresh, installable build. Ad-hoc signed only — no Apple secrets
# required.
#
# Trigger either way:
#   • Push a version tag:   git tag v0.1.1 && git push origin v0.1.1
#   • Run manually:         Actions tab → Release → Run workflow
# Both publish the DMG and mark the release as "latest", so
# releases/latest/download/Oatmeal-macOS-arm64.dmg is a stable one-click link.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish/refresh"
        default: latest

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14 # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Ensure cmake (builds whisper.cpp)
        run: brew list cmake >/dev/null 2>&1 || brew install cmake

      - name: Install JS dependencies
        run: npm ci

      - name: Build whisper-server (pinned whisper.cpp)
        run: npm run build:whisper

      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Bundle default Whisper model (small.en)
        run: |
          mkdir -p resources/models
          curl -fL --retry 3 -o resources/models/ggml-small.en.bin \
            https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.en.bin

      - name: Build DMG
        run: npm run dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Latest build' }}
          make_latest: "true"
          files: release/*.dmg
          fail_on_unmatched_files: true
